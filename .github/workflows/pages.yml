name: Deploy privacy policy to GitHub Pages

# Publishes the static files under docs/ (privacy-policy.html, index.html) to
# GitHub Pages. The resulting privacy-policy URL is required by the Google
# Play Console Data safety form.
#
# One-time setup after pushing this repo to GitHub:
#   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
# Then this workflow publishes on every push to the default branch.

on:
  push:
    branches: ["main", "master"]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
